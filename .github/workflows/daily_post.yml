name: Autonomous Gemini SNS Agent (v4.0)

on:
  schedule:
    - cron: '0 */2 * * *' # 2시간마다 실행
  workflow_dispatch: # 수동 실행 가능

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Autonomous Post Script
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMAGE_URL: 'https://raw.githubusercontent.com/ALEXCHOI21/ChoiGPT_Service/main/sns_promotion_image.png'
        run: |
          node -e "
          const themes = [
            'ChoiGPT의 AI 기반 HW/SW 고속 개발 서비스 홍보',
            '실전 아두이노 및 릴리패드 창의 교육 프로그램 홍보',
            '생산성을 10배 높이는 생성형 AI 실무 워크숍 홍보',
            '전국 청소년 AI 창의 경진대회 및 공모전 전략 지원 서비스 홍보',
            '혁신적인 하드웨어 아키텍처와 임베디드 시스템 설계 전문성 강조'
          ];

          async function generateCaption(theme) {
            const prompt = '스타트업 ChoiGPT의 인스타그램 홍보 문구를 작성해줘. 주제: ' + theme + '. 조건: 한국어, 매우 전문적이고 세련된 비즈니스 톤, 적절한 이모지 사용, 가독성 좋은 리스트 형식 포함, 마지막에 관련 해시태그 15개 포함. 인스타그램 게시용이므로 매력적으로 작성해줘.';
            
            const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
          }

          async function post() {
            const theme = themes[Math.floor(Math.random() * themes.length)];
            console.log('Target Theme:', theme);
            
            const caption = await generateCaption(theme);
            const finalCaption = caption + '\n\n🔗 포털: https://alexchoi21.github.io/ChoiGPT_Service/\n💬 카톡: https://open.kakao.com/o/syhiQlsi';

            const containerRes = await fetch('https://graph.instagram.com/v20.0/' + process.env.IG_USER_ID + '/media?image_url=' + encodeURIComponent(process.env.IMAGE_URL) + '&caption=' + encodeURIComponent(finalCaption) + '&access_token=' + process.env.IG_ACCESS_TOKEN, { method: 'POST' });
            const containerData = await containerRes.json();
            if (containerData.error) throw new Error(JSON.stringify(containerData.error));
            
            console.log('Container created, waiting 30s...');
            await new Promise(r => setTimeout(r, 30000));
            
            const pubRes = await fetch('https://graph.instagram.com/v20.0/' + process.env.IG_USER_ID + '/media_publish?creation_id=' + containerData.id + '&access_token=' + process.env.IG_ACCESS_TOKEN, { method: 'POST' });
            const pubData = await pubRes.json();
            if (pubData.error) throw new Error(JSON.stringify(pubData.error));
            console.log('SUCCESS! Post Published by Gemini.');
          }
          post().catch(e => { console.error(e); process.exit(1); });
          "
