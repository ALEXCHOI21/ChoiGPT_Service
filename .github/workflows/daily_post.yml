name: Gemini SNS Agent (v5.0)

on:
  schedule:
      - cron: '0 */2 * * *'
        workflow_dispatch:

        jobs:
          post:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout
                                uses: actions/checkout@v3
                                      - name: Set up Node.js
                                              uses: actions/setup-node@v3
                                                      with:
                                                                node-version: '18'
                                                                      - name: Run Post Script
                                                                              env:
                                                                                        IG_USER_ID: ${{ secrets.IG_USER_ID }}
                                                                                                  IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
                                                                                                            FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
                                                                                                                      FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
                                                                                                                                GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                                                                                                                                          IMAGE_URL: 'https://raw.githubusercontent.com/ALEXCHOI21/ChoiGPT_Service/main/customer_lite_infographic.png'
                                                                                                                                                  run: |
                                                                                                                                                            node -e "
                                                                                                                                                                      async function post() {
                                                                                                                                                                                  console.log('Starting...');
                                                                                                                                                                                              const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY, {
                                                                                                                                                                                                            method: 'POST',
                                                                                                                                                                                                                          headers: { 'Content-Type': 'application/json' },
                                                                                                                                                                                                                                        body: JSON.stringify({ contents: [{ parts: [{ text: 'Create a Korean SNS post for ChoiGPT about AI.' }] }] })
                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                const data = await res.json();
                                                                                                                                                                                                                                                                            if (!data.candidates) throw new Error('Gemini Error: ' + JSON.stringify(data));
                                                                                                                                                                                                                                                                                        console.log('Caption Generated');
                                                                                                                                                                                                                                                                                                    console.log('SUCCESS');
                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                        post().catch(e => { console.error(e); process.exit(1); });
                                                                                                                                                                                                                                                                                                                                  "
                                                                                                                                                                                                                                                                                                                                  
