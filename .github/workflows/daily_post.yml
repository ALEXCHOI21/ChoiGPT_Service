name: 2-Hour Loop SNS Promotion (Premium v3.0)

on:
  schedule:
    - cron: '0 */2 * * *' # 2시간마다 실행 (02:00, 04:00, ..., 00:00 UTC)
  workflow_dispatch: # 수동 실행 가능

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Auto Post Script
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMAGE_URL: 'https://raw.githubusercontent.com/ALEXCHOI21/ChoiGPT_Service/main/sns_promotion_image.png'
        run: |
          node -e "
          const themes = [
            {
              title: '🚀 당신의 아이디어를 현실로! ChoiGPT Corp. 통합 포털 OPEN!',
              content: 'AI 에이전트와 하드웨어의 혁신적 융합, 이제 한 곳에서 확인하세요. 🛠️✨\n\n💎 ChoiGPT만의 4가지 핵심 가치\n1️⃣ AI 기반 HW/SW 고속 개발\n2️⃣ 실전 아두이노 & 릴리패드 창의 교육\n3️⃣ 생산성을 10배 높이는 GenAI 실무 워크숍\n4️⃣ 공모전 완벽 전략 지원'
            },
            {
              title: '💡 초고속 프로토타이핑, AI 에이전트와 함께라면 가능합니다.',
              content: '아이디어 구상부터 실물 제작까지, 기술적 장벽을 ChoiGPT가 해결해 드립니다. 🤖🔌\n\n✅ 비즈니스 자동화 솔루션\n✅ 맞춤형 임베디드 시스템 설계\n✅ 창의적인 하드웨어 아키텍처'
            },
            {
              title: '🏆 공모전 필승 전략, ChoiGPT가 기획부터 제작까지 밀착 지원합니다.',
              content: '차별화된 기술력으로 공모전의 수준을 한 단계 높이세요. 🥇\n\n✨ 최신 AI 트렌드 반영\n✨ 동작 가능한 프로토타입 제작\n✨ 전문적인 기술 멘토링'
            },
            {
              title: '🎓 미래를 만드는 코딩 교육, ChoiGPT의 맞춤형 커리큘럼을 만나보세요.',
              content: '단순한 코딩을 넘어, 하드웨어를 직접 제어하는 실전 교육을 제공합니다. 💻🔋\n\n🔹 아두이노/릴리패드 특화 교육\n🔹 초중고 AI 창의 경진대회 대비\n🔹 실무 중심의 하드웨어 프로그래밍'
            }
          ];

          const selected = themes[Math.floor(Math.random() * themes.length)];
          const hashtags = '\n\n#ChoiGPT #AI에이전트 #하드웨어교육 #아두이노 #릴리패드 #웨어러블테크 #공모전준비 #생성형AI #대전AI #기술컨설팅 #스타트업 #비즈니스자동화';
          const link = '\n\n🔗 포털: https://alexchoi21.github.io/ChoiGPT_Service/\n💬 상담: https://open.kakao.com/o/syhiQlsi';
          
          const finalCaption = selected.title + '\n\n' + selected.content + link + hashtags;

          async function post() {
            const containerRes = await fetch('https://graph.instagram.com/v20.0/' + process.env.IG_USER_ID + '/media?image_url=' + encodeURIComponent(process.env.IMAGE_URL) + '&caption=' + encodeURIComponent(finalCaption) + '&access_token=' + process.env.IG_ACCESS_TOKEN, { method: 'POST' });
            const containerData = await containerRes.json();
            if (containerData.error) throw new Error(JSON.stringify(containerData.error));
            
            console.log('Container created, waiting 30s...');
            await new Promise(r => setTimeout(r, 30000));
            
            const pubRes = await fetch('https://graph.instagram.com/v20.0/' + process.env.IG_USER_ID + '/media_publish?creation_id=' + containerData.id + '&access_token=' + process.env.IG_ACCESS_TOKEN, { method: 'POST' });
            const pubData = await pubRes.json();
            if (pubData.error) throw new Error(JSON.stringify(pubData.error));
            console.log('SUCCESS! Post ID: ' + pubData.id);
          }
          post().catch(e => { console.error(e); process.exit(1); });
          "
