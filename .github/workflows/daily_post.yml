name: Multi-Channel Gemini SNS Agent (v5.0)

on:
  schedule:
      - cron: '0 */2 * * *' # Every 2 hours
        workflow_dispatch:

        jobs:
          post:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout
                                uses: actions/checkout@v3
                                      - name: Set up Node.js
                                              uses: actions/setup-node@v3
                                                      with:
                                                                node-version: '18'
                                                                      - name: Run Multi-Channel Post Script
                                                                              env:
                                                                                        IG_USER_ID: ${{ secrets.IG_USER_ID }}
                                                                                                  IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
                                                                                                            FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
                                                                                                                      FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
                                                                                                                                GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                                                                                                                                          IMAGE_URL: 'https://raw.githubusercontent.com/ALEXCHOI21/ChoiGPT_Service/main/customer_lite_infographic.png'
                                                                                                                                                  run: |
                                                                                                                                                            node -e "
                                                                                                                                                                      const themes = [
                                                                                                                                                                                  'AI-based development service',
                                                                                                                                                                                              'Creative education program',
                                                                                                                                                                                                          'AI workshop for productivity',
                                                                                                                                                                                                                      'Youth AI Competition support',
                                                                                                                                                                                                                                  'Hardware design expertise',
                                                                                                                                                                                                                                              'AI marketing agent service'
                                                                                                                                                                                                                                                        ];
                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                  async function generateCaption(theme) {
                                                                                                                                                                                                                                                                              const prompt = 'Create a Korean social media post for ChoiGPT. Theme: ' + theme;
                                                                                                                                                                                                                                                                                          const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY, {
                                                                                                                                                                                                                                                                                                        method: 'POST',
                                                                                                                                                                                                                                                                                                                      headers: { 'Content-Type': 'application/json' },
                                                                                                                                                                                                                                                                                                                                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                            const data = await res.json();
                                                                                                                                                                                                                                                                                                                                                                        if (data.error) throw new Error('Gemini Error: ' + JSON.stringify(data.error));
                                                                                                                                                                                                                                                                                                                                                                                    return data.candidates[0].content.parts[0].text;
                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                        async function postToInstagram(caption) {
                                                                                                                                                                                                                                                                                                                                                                                                                    console.log('Posting to Instagram');
                                                                                                                                                                                                                                                                                                                                                                                                                                const cRes = await fetch('https://graph.instagram.com/v20.0/' + process.env.IG_USER_ID + '/media?image_url=' + encodeURIComponent(process.env.IMAGE_URL) + '&caption=' + encodeURIComponent(caption) + '&access_token=' + process.env.IG_ACCESS_TOKEN, { method: 'POST' });
                                                                                                                                                                                                                                                                                                                                                                                                                                            const cData = await cRes.json();
                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (cData.error) throw new Error('IG Container: ' + JSON.stringify(cData.error));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    await new Promise(r => setTimeout(r, 30000));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const pRes = await fetch('https://graph.instagram.com/v20.0/' + process.env.IG_USER_ID + '/media_publish?creation_id=' + cData.id + '&access_token=' + process.env.IG_ACCESS_TOKEN, { method: 'POST' });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const pData = await pRes.json();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (pData.error) throw new Error('IG Publish: ' + JSON.stringify(pData.error));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            async function postToFacebook(caption) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        console.log('Posting to Facebook');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const res = await fetch('https://graph.facebook.com/v20.0/' + process.env.FB_PAGE_ID + '/photos?url=' + encodeURIComponent(process.env.IMAGE_URL) + '&caption=' + encodeURIComponent(caption) + '&access_token=' + process.env.FB_ACCESS_TOKEN, { method: 'POST' });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const data = await res.json();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (data.error) throw new Error('FB Post: ' + JSON.stringify(data.error));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                async function run() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const theme = themes[Math.floor(Math.random() * themes.length)];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const caption = await generateCaption(theme);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const finalCaption = caption + '\n\nPortal: https://alexchoi21.github.io/ChoiGPT_Service/';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                await Promise.all([postToInstagram(finalCaption), postToFacebook(finalCaption)]);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            console.log('SUCCESS');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run().catch(e => { console.error(e); process.exit(1); });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          "
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
