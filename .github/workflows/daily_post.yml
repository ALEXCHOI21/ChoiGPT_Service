name: Multi-Channel Gemini SNS Agent (v5.0)

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */2 * * *' # 2시간마다 실행
  workflow_dispatch: # 수동 실행 가능

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Multi-Channel Post Script
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMAGE_URL: 'https://alexchoi21.github.io/ChoiGPT_Service/customer_lite_infographic.png'
        run: |
          cat << 'EOF' > post_script.js
          const themes = [
            'ChoiGPT의 AI 기반 HW/SW 고속 개발 서비스 홍보',
            '실전 아두이노 및 릴리패드 창의 교육 프로그램 홍보',
            '생산성을 10배 높이는 생성형 AI 실무 워크숍 홍보',
            '전국 청소년 AI 창의 경진대회 및 공모전 전략 지원 서비스 홍보',
            '혁신적인 하드웨어 아키텍처와 임베디드 시스템 설계 전문성 강조',
            '24시간 자율형 AI 마케팅 에이전트 서비스 도입 안내'
          ];
          const GEMINI_API_KEY = (process.env.GEMINI_API_KEY || '').trim();
          const IG_USER_ID = (process.env.IG_USER_ID || '').trim();
          const IG_ACCESS_TOKEN = (process.env.IG_ACCESS_TOKEN || '').trim();
          const FB_PAGE_ID = (process.env.FB_PAGE_ID || '').trim();
          const FB_ACCESS_TOKEN = (process.env.FB_ACCESS_TOKEN || '').trim();

          async function generateContent(theme) {
            const prompt = `스타트업 ChoiGPT 홍보를 위해 다음 주제에 대한 콘텐츠를 플랫폼별로 최적화하여 생성해줘. 주제: ${theme}
            응답은 반드시 아래 JSON 형식으로만 출력해 (마크다운 없이 순수 JSON만):
            {
              "ig_caption": "인스타그램용 문구 (감성적, 이모지 풍부, 짧고 강렬한 문체, 해시태그 20개 포함. 절대로 **, *, # 같은 마크다운 기호 사용 금지, 강조는 이모지로만 할 것)",
              "fb_caption": "페이스북용 문구 (정보 전달 중심, 전문적인 비즈니스 톤, 가독성 좋은 리스트 형식, 신뢰감 주는 문체. 절대로 **, *, # 같은 마크다운 기호 사용 금지, 가독성을 위해 이모지 체크박스 사용)",
              "imagePrompt": "A bright, minimalist, high-end professional corporate office scene. Professional business people working in a clean, sunlit modern workspace. Professional photography, soft lighting, premium business aesthetic, 8k, ultra-realistic. No dark or cyberpunk themes."
            }`;
            
            let lastError;
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + GEMINI_API_KEY, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                
                if (res.status === 429) {
                  const delay = Math.pow(2, attempt) * 1000;
                  console.warn(`Rate limited (429). Retrying in ${delay}ms... (Attempt ${attempt}/3)`);
                  await new Promise(r => setTimeout(r, delay));
                  continue;
                }

                if (!data.candidates) throw new Error('Gemini API Error: ' + JSON.stringify(data));
                
                const rawText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                let parsed = JSON.parse(rawText);
                
                // 마크다운 기호 강제 제거 필터링
                parsed.ig_caption = parsed.ig_caption.replace(/\*\*|\*/g, '');
                parsed.fb_caption = parsed.fb_caption.replace(/\*\*|\*/g, '');
                
                return parsed;
              } catch (e) {
                lastError = e;
                console.error(`Attempt ${attempt} failed:`, e.message);
                if (attempt < 3) await new Promise(r => setTimeout(r, 2000));
              }
            }
            throw lastError;
          }

          async function postToInstagram(caption, imageUrl) {
            console.log('--- Posting to Instagram ---');
            const containerRes = await fetch('https://graph.facebook.com/v20.0/' + IG_USER_ID + '/media?image_url=' + encodeURIComponent(imageUrl) + '&caption=' + encodeURIComponent(caption) + '&access_token=' + IG_ACCESS_TOKEN, { method: 'POST' });
            const containerData = await containerRes.json();
            if (containerData.error) throw new Error('IG Container: ' + JSON.stringify(containerData.error));
            
            console.log('IG Container created, waiting 30s...');
            await new Promise(r => setTimeout(r, 30000));
            
            const pubRes = await fetch('https://graph.facebook.com/v20.0/' + IG_USER_ID + '/media_publish?creation_id=' + containerData.id + '&access_token=' + IG_ACCESS_TOKEN, { method: 'POST' });
            const pubData = await pubRes.json();
            if (pubData.error) throw new Error('IG Publish: ' + JSON.stringify(pubData.error));
            console.log('IG Post Success!');
          }

          async function postToFacebook(caption, imageUrl) {
            console.log('--- Posting to Facebook ---');
            const res = await fetch('https://graph.facebook.com/v20.0/' + FB_PAGE_ID + '/photos?url=' + encodeURIComponent(imageUrl) + '&caption=' + encodeURIComponent(caption) + '&access_token=' + FB_ACCESS_TOKEN, { method: 'POST' });
            const data = await res.json();
            if (data.error) throw new Error('FB Post: ' + JSON.stringify(data.error));
            console.log('FB Post Success!');
          }

          async function run() {
            const theme = themes[Math.floor(Math.random() * themes.length)];
            console.log('Selected Theme:', theme);
            
            const { ig_caption, fb_caption, imagePrompt } = await generateContent(theme);
            const seed = Math.floor(Math.random() * 1000000);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(imagePrompt)}?width=1080&height=1080&nologo=true&seed=${seed}`;
            console.log('Generated Image URL:', imageUrl);

            const footer = '\n\n\uD83D\uDD17 \uD3EC\uD138: https://alexchoi21.github.io/ChoiGPT_Service/\n\uD83D\uDCAC \uBB38\uC758: https://open.kakao.com/o/syhiQlsi';

            await Promise.all([
              postToInstagram(ig_caption + footer, imageUrl),
              postToFacebook(fb_caption + footer, imageUrl)
            ]);
            console.log('ALL CHANNELS POSTED SUCCESSFULLY WITH PLATFORM-SPECIFIC CONTENT!');
          }

          run().catch(e => { console.error(e); process.exit(1); });
          EOF
          node post_script.js
