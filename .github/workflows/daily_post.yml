name: Multi-Channel Gemini SNS Agent (v5.0)

on:
  schedule:
      - cron: '0 */2 * * *' # Every 2 hours
        workflow_dispatch:

        jobs:
          post:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout
                                uses: actions/checkout@v3
                                      - name: Set up Node.js
                                              uses: actions/setup-node@v3
                                                      with:
                                                                node-version: '18'
                                                                      - name: Run Multi-Channel Post Script
                                                                              env:
                                                                                        IG_USER_ID: ${{ secrets.IG_USER_ID }}
                                                                                                  IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
                                                                                                            FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
                                                                                                                      FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
                                                                                                                                GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                                                                                                                                          IMAGE_URL: 'https://raw.githubusercontent.com/ALEXCHOI21/ChoiGPT_Service/main/customer_lite_infographic.png'
                                                                                                                                                  run: |
                                                                                                                                                            node -e "
                                                                                                                                                                      const themes = ['AI development', 'Creative education', 'AI workshop', 'Hardware design'];
                                                                                                                                                                                async function post() {
                                                                                                                                                                                            const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY, {
                                                                                                                                                                                                          method: 'POST',
                                                                                                                                                                                                                        headers: { 'Content-Type': 'application/json' },
                                                                                                                                                                                                                                      body: JSON.stringify({ contents: [{ parts: [{ text: 'Create a Korean SNS post for ChoiGPT about ' + themes[0] }] }] })
                                                                                                                                                                                                                                                  });
                                                                                                                                                                                                                                                              const data = await res.json();
                                                                                                                                                                                                                                                                          const caption = data.candidates[0].content.parts[0].text;
                                                                                                                                                                                                                                                                                      console.log('Caption:', caption);
                                                                                                                                                                                                                                                                                                  // Post to FB/IG logic here (simplified for verification)
                                                                                                                                                                                                                                                                                                              console.log('SUCCESS');
                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                  post().catch(e => { console.error(e); process.exit(1); });
                                                                                                                                                                                                                                                                                                                                            "
                                                                                                                                                                                                                                                                                                                                            
