<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChoiGPT B2B Marketing Admin</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">ChoiGPT <span>B2B Admin</span></div>
            <div class="nav-links">
                <a href="#dashboard">대시보드</a>
                <a href="#add-client">고객 등록</a>
                <a href="../index.html">메인으로</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section id="dashboard" class="animate-up">
            <h2 class="gradient-text">고객 관리 대시보드</h2>
            <p class="section-desc">현재 자동화 마케팅이 진행 중인 고객사 리스트입니다.</p>
            
            <div id="client-list" class="client-grid">
                <!-- 클라이언트 카드가 여기에 동적으로 생성됨 -->
                <div class="loading">데이터를 불러오는 중...</div>
            </div>
        </section>

        <section id="add-client" class="glass-card animate-up" style="margin-top: 4rem;">
            <h2 class="gradient-text">신규 고객 등록</h2>
            <p style="color: var(--text-dim); margin-bottom: 2rem;">업체 정보 및 마케팅 계정을 입력해주세요. 모든 정보는 암호화되어 안전하게 보관됩니다.</p>
            
            <form id="client-form" class="admin-form">
                <div class="form-group">
                    <label>상호명</label>
                    <input type="text" id="business_name" placeholder="예: 맛있는 카페 대전점" required>
                </div>
                <div class="form-group">
                    <label>업체 기본 정보 (위치, 주요 타겟 등)</label>
                    <textarea id="business_info" placeholder="예: 대전 둔산동 위치, 2030 여성 타겟, 수제 디저트 전문" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>인스타그램 아이디</label>
                        <input type="text" id="ig_username" placeholder="Instagram ID" required>
                    </div>
                    <div class="form-group">
                        <label>인스타그램 비밀번호</label>
                        <input type="password" id="ig_password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>적용 마케팅 방법론</label>
                    <select id="marketing_methodology">
                        <option value="STP">STP 전략 (시장 세분화, 타겟팅, 포지셔닝)</option>
                        <option value="AIDA">AIDA 모델 (주의, 관심, 욕구, 행동)</option>
                        <option value="SWOT">SWOT 분석 기반 전략</option>
                        <option value="4P">4P 믹스 (제품, 가격, 유통, 촉진)</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">고객 등록 및 상권 분석 시작</button>
            </form>
        </section>
    </main>

    <!-- 분석 리포트 모달 -->
    <div id="report-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title" class="gradient-text">상권 분석 리포트</h2>
            <div id="report-content" class="report-body">
                <!-- 리포트 내용 -->
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
