<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChoiGPT B2B ADMIN | 통합 제어 센터</title>
    <!-- 캐시 방지를 위해 CSS 버전을 강제 지정합니다 -->
    <link rel="stylesheet" href="admin_style.css?v=1.2">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <nav>
            <div class="container nav-container">
                <div class="logo">ChoiGPT <span>B2B ADMIN</span></div>
                <div class="nav-links">
                    <a href="#dashboard">제어판</a>
                    <a href="#add-client">클라이언트 등록</a>
                    <a href="#" onclick="resetKeys()" style="color: var(--system-purple);">키 초기화</a>
                    <a href="../index.html">시스템 종료</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container" style="padding-top: 120px;">
        <section id="dashboard" class="animate-up">
            <header class="section-header">
                <h1 class="gradient-text h2">고객 관리 대시보드</h1>
                <p class="section-desc" style="color: var(--text-secondary); margin-top: 8px;">실시간 마케팅 자동화 및 상권 분석 모니터링</p>
            </header>
            <div id="client-list" class="client-grid">
                <div class="loading" style="color: var(--neon-cyan);">데이터 동기화 중...</div>
            </div>
        </section>

        <hr style="border: none; border-top: 1px solid var(--glass-border); margin: 80px 0;">

        <section id="add-client" class="animate-up">
            <div class="glass-card">
                <header>
                    <h2 class="gradient-text h3">신규 클라이언트 등록</h2>
                    <p style="color: var(--text-muted); margin-bottom: 32px; font-size: 0.9rem;">
                        업체 정보를 입력하면 AI가 즉시 Google Maps API를 통해 지역 기반 마켓 인텔리전스를 수집합니다.
                    </p>
                </header>
                
                <form id="client-form" class="admin-form">
                    <div class="form-group">
                        <label for="business_name">상호명</label>
                        <input type="text" id="business_name" placeholder="예: 맛있는 카페 대전점" required>
                    </div>
                    <div class="form-group">
                        <label for="business_info">업체 핵심 정보 (위치, 주요 타겟 등)</label>
                        <textarea id="business_info" placeholder="예: 대전 둔산동 위치, 2030 여성 타겟, 수제 디저트 전문" rows="3"></textarea>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                        <div class="form-group">
                            <label for="ig_username">인스타그램 계정 (선택)</label>
                            <input type="text" id="ig_username" placeholder="ID (분석만 필요시 공란)">
                        </div>
                        <div class="form-group">
                            <label for="ig_password">비밀번호 (선택)</label>
                            <input type="password" id="ig_password" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="service_type">서비스 유형</label>
                        <select id="service_type" onchange="toggleContractPeriod()">
                            <option value="analysis_only">초기 상권 분석 (무료/체험)</option>
                            <option value="automation_full">24시간 마케팅 자동화 (정식 계약)</option>
                        </select>
                    </div>

                    <div id="contract_period_group" class="form-group" style="display: none;">
                        <label for="contract_period">계약 기간 (자동 마케팅 정식 계약)</label>
                        <select id="contract_period">
                            <option value="1개월 (베이직)">1개월 (MVP 검증형)</option>
                            <option value="3개월 (스타터)">3개월 (상권 최적화형 - 10% 할인)</option>
                            <option value="6개월 (그로스)">6개월 (매출 성장형 - 20% 할인)</option>
                            <option value="12개월 (엔터프라이즈)">12개월 (시장 독점형 - 30% 할인)</option>
                        </select>
                    </div>

                    <!-- 통합 분석 모드 안내 (프레임워크 선택창 대신 노출) -->
                    <div class="form-group">
                        <label>AI 마케팅 전략 모드</label>
                        <div style="background: rgba(0, 255, 240, 0.05); padding: 16px; border-radius: 4px; border: 1px solid rgba(0, 255, 240, 0.2);">
                            <p style="color: var(--neon-cyan); font-size: 0.9rem; font-weight: 600; margin-bottom: 8px;">
                                <span class="pulse">●</span> 통합 인텔리전스 모드 자동 적용
                            </p>
                            <p style="color: var(--text-muted); font-size: 0.8rem; line-height: 1.4;">
                                <strong>STP, AIDA, SWOT, 4P</strong> 전 분야에 걸친 입체적인 마케팅 리포트가 자동으로 생성됩니다.
                            </p>
                        </div>
                        <input type="hidden" id="marketing_methodology" value="Integrated (STP, AIDA, SWOT, 4P)">
                    </div>
                    
                    <button type="submit" class="btn-primary">데이터베이스 등록 및 상권 분석 개시</button>
                </form>
            </div>
        </section>
    </main>

    <div id="report-modal" class="modal">
        <div class="modal-content animate-up">
            <span class="close-modal">&times;</span>
            <header>
                <h2 id="modal-title" class="gradient-text h3">분석 리포트</h2>
                <div style="height: 1px; background: var(--neon-cyan); width: 60px; margin-top: 12px; opacity: 0.5;"></div>
            </header>
            <div id="report-content" class="report-body" style="margin-top: 32px;"></div>
        </div>
    </div>

    <script src="dashboard.js?v=2.5"></script>
</body>
</html>
